global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'data-platform'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:8000']
        labels:
          service: 'backend'

  - job_name: 'prefect'
    static_configs:
      - targets: ['prefect-server:4200']
        labels:
          service: 'prefect'
