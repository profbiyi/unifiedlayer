version: "3.9"

services:
  # ─── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: data_platform
      POSTGRES_USER: dataplatform
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dataplatform_secure_2026}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dataplatform -d data_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    environment:
      DATABASE_URL: postgresql://dataplatform:${POSTGRES_PASSWORD:-dataplatform_secure_2026}@postgres:5432/data_platform
      REDIS_URL: redis://redis:6379/0
      PREFECT_API_URL: http://prefect:4200/api
      ENVIRONMENT: production
      FRONTEND_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  # ─── Frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy

  # ─── Prefect Server (Orchestration) ──────────────────────────
  prefect:
    image: prefecthq/prefect:3-python3.11
    restart: unless-stopped
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://dataplatform:${POSTGRES_PASSWORD:-dataplatform_secure_2026}@postgres:5432/data_platform
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
